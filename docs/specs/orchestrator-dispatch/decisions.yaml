    validated: false

  - id: A3
    statement: "mgId=null children on adapter-shared mode preserve isolation"
    impact: low
    validation: "Reconfirm during /team-plan; trace resolveSession semantics for mgId=null + threadId=null inputs"
    validated: false

  - id: A4
    statement: "Slack chat.postMessage with thread_ts returns the new in-thread ts, suitable as thread_id for subsequent posts"
    impact: low
    validation: "Slack API docs confirm; smoke test in Phase 1 build"
    validated: false

  - id: A5
    statement: "Discord.js channel.threads.create({startMessage}) returns thread object with stable id usable as thread_id"
    impact: low
    validation: "Smoke test in Phase 1 build against discord.js v14"
    validated: false

  - id: A6
    statement: "chokidar watching data/v2-sessions/*/outbound.db does not exceed inotify limits at typical session counts"
    impact: low
    validation: "Check /proc/sys/fs/inotify/max_user_watches at /team-build"
    validated: false

  - id: A7
    statement: "Existing webhook-server.ts route registration mechanism supports adding non-webhook routes"
    impact: low
    validation: "Read webhook-server.ts end-to-end at /team-plan; confirm route table extensibility"
    validated: false

  - id: A8
    statement: "Channels branch ships createThread/postParent adapter additions without regressing existing delivery paths"
    impact: medium
    validation: "Land adapter additions on channels branch first; validate with existing Slack+Discord installs"
    validated: false

  - id: A9
    statement: "tasks.last_progress_at written by task_progress is sufficient to keep an active task alive against the no-progress watchdog"
    impact: high
    validation: "Test plan in /team-tdd: write recurring task_progress from a long-running child, confirm no auto-failure across multiple sweep ticks"
    validated: false

  - id: A10
    statement: "Caller-supplied task_id = task-${idempotency_key} collisions across orchestrators are improbable enough that PK uniqueness suffices"
    impact: low
    validation: "Document in tool description that idempotency_key namespace is per-orchestrator"
    validated: false
    superseded_by: cycle-1-review-M6
    note: "Cycle 1 review (M6) escalated this assumption to MUST-FIX. Three-reviewer convergence (A, B, C) flagged that namespace must be schema-encoded, not convention. Resolution: derive task_id = hash(parent_session_id, idempotency_key) + UNIQUE(parent_session_id, idempotency_key)."


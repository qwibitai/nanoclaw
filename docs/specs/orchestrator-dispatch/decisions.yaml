design_decisions:
  - id: D3
    question: "Task lifecycle representation: coarse status + nullable artifacts vs fine-grained dispatch_state machine vs eventless inferred status"
    options_considered:
      - "Option A: Coarse status (pending/running/completed/failed/cancelled) + nullable artifact columns; state derives from data"
      - "Option B: Fine-grained dispatch_state machine (pending/admitted/creating_thread/parent_posted/thread_created/running/completing/completed/failed/cancelled) — cycle 3 pattern"
      - "Option C: No status column; lifecycle fully inferred from artifact column nullability"
    chosen: "Option A — coarse status + nullable artifacts (single source of truth from data)"
    rationale: |
      Cycle 3 v1 of the prior abandoned attempt accumulated 3 MUST-FIX findings (M-29, M-30, M-31)
      all stemming from parallel state/timestamp columns drifting from artifact columns. Option A
      eliminates this entire bug class by construction — there is no parallel column to drift.
      Aligns with existing nanoclaw schema patterns (sessions table is exactly this shape). C7
      watchdog timer reset is structurally correct: last_progress_at is the single timer column,
      written by task_progress and read by host-sweep. Option B was greenlit by Reviewer B
      (best-practice) as Temporal-conformant but its implementation gaps are not theoretical —
      they bit cycle 3 three times. Option C reduces query ergonomics without correctness gain.
    asked_at: design-step-4
    answered_by: design-step-6
    rejected:
      - option: "Option B (fine-grained dispatch_state)"
        reason: "Empirically accumulates phantom-column / state-drift bugs (cycle 3 v1 evidence). Redundant with artifact columns."
      - option: "Option C (no status column)"
        reason: "Long null-check WHERE clauses without correctness benefit; foreign to existing nanoclaw schema patterns."

design_constraints_added:
  - id: C12
    classification: HARD
    statement: "tasks table contains last_progress_at and last_progress_message columns from initial migration (026)"
    source: design
    rationale: "Required to honor C7 (timer reset on task_progress) and prevent M-30 phantom-column repeat from cycle 3."

  - id: C13
    classification: HARD
    statement: "Watchdog reads last_progress_at — NOT a separate dispatch_state_updated_at timer"
    source: design
    rationale: "Single timer column eliminates the M-31 class of bugs where progress signals fail to reset the watchdog. last_progress_at is written by both first-heartbeat and task_progress."

  - id: C14
    classification: HARD
    statement: "Crash recovery resumes from first NULL artifact column (admitted_at → parent_platform_message_id → child_platform_thread_id → child_session_id)"
    source: design
    rationale: "Option A reconciliation logic. Reconciler scans tasks in pending/running state and continues the dispatch pipeline from the first incomplete artifact step."

  - id: C15
    classification: SOFT
    statement: "Dashboard auth uses per-owner cookie exchange via DM-issued one-time token"
    source: design
    rationale: "Alternative (LAN-only auth, OS user check) is fragile to mistaken access. DM token leverages existing channel auth; user must already be the owner to receive the DM."


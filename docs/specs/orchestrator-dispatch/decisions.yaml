# Decision record for orchestrator-dispatch
# Initialized by /team-brief on 2026-05-09
# Schema: skills/shared/decision-record-schema.md

feature: orchestrator-dispatch
brief_path: docs/specs/orchestrator-dispatch/brief.md
generated_at: 2026-05-09

constraints:
  - id: C1
    classification: HARD
    statement: "Total additional resident memory for the dashboard process must not exceed 150MB under normal load"
    source: user-explicit
    rationale: "User stated 'memory efficient AF'. Multica (~400-700MB Postgres+Go+Next.js stack) explicitly rejected on this constraint."

  - id: C2
    classification: HARD
    statement: "No new long-running service. Dashboard piggybacks on existing Node host process."
    source: derived-from-C1
    rationale: "Memory budget rules out separate daemon, separate Postgres, separate Go binary."

  - id: C3
    classification: HARD
    statement: "dispatch_task is additive infrastructure. Must not modify or replace src/modules/agent-to-agent/."
    source: user-explicit
    rationale: "User pushed back on reusing agent-to-agent. Both primitives coexist for different patterns: agent-to-agent for hierarchical subagents, dispatch_task for flat orchestrator fanout."

  - id: C4
    classification: HARD
    statement: "Synthetic thread IDs must not reach a channel adapter that would deliver into a real platform thread. Children must use mgId=null OR a real platform thread from new adapter.createThread capability."
    source: codex-verified-and-traced
    rationale: "Verified via session-manager.ts:340 → delivery.ts:358-364 → adapter.deliver path. Slack chat.postMessage with synthetic thread_ts errors or posts to channel root."

  - id: C5
    classification: HARD
    statement: "Reverse signal (task_complete/task_failed) uses NEW system action in delivery.ts, NOT channel_type='agent'."
    source: codex-finding-cycle3
    rationale: "Reusing agent-to-agent return path drags in agent_destinations ACL and per-pair name assumptions. Direct system action keeps bypass surgical."

  - id: C6
    classification: HARD
    statement: "Cancellation authorization requires parent_session_id match OR owner/admin override path with audit."
    source: codex-finding-cycle3-v1
    rationale: "Orchestrator role check alone insufficient — any prompt-injected orchestrator session could otherwise cancel any other orchestrator's tasks."

  - id: C7
    classification: HARD
    statement: "Watchdog no-progress timer must be reset by genuine progress signals (task_progress MCP call or host-observed child activity)."
    source: codex-finding-cycle3-v1
    rationale: "Without reset, a long-running task that actively reports gets auto-killed at first heartbeat + 30min — contradicts the purpose of progress reporting."

  - id: C8
    classification: HARD
    statement: "Owner-authentication on dashboard reuses existing user_roles via src/modules/permissions/access.ts."
    source: derived-from-existing-architecture
    rationale: "Don't introduce parallel auth scheme. user_roles is the canonical owner/admin resolution path."

  - id: C9
    classification: HARD
    statement: "Phase 1 ships adapter.createThread for Slack and Discord. Other channels degrade to mgId=null for children."
    source: user-decision-q1
    rationale: "User chose 'Merge into one shippable Phase 1' — chattable threads are core to the vision."

  - id: C10
    classification: SOFT
    statement: "Dashboard visual quality must pass jony-ive audit and impeccable design review."
    source: user-explicit
    rationale: "User said: 'we have UI/UX design skills to leverage as well for the UI build'. Dashboard should feel premium, not default-MUI admin panel."

decisions:
  - id: D1
    question: "Phase 1 shape: mgId=null architecture-only milestone, full chattable threads, or threads-required-no-fallback?"
    options_considered:
      - "Phase 1A (mgId=null) as architecture validation, Phase 1B adds adapter.createThread"
      - "Merge into one shippable Phase 1 with adapter.createThread for Slack/Discord, mgId=null fallback for non-thread channels"
      - "Skip mgId=null entirely; threads required, error on non-thread channels"
    chosen: "Merge into one shippable Phase 1 (option 2)"
    rationale: "User chose this in Step 3 Q1. Delivers the chattable-threads vision in one milestone. Faster path to user-facing value than splitting; cleaner than refusing on non-thread channels."
    asked_at: step-3
    answered_by: user

  - id: D2
    question: "Phase 2 dashboard read-only at launch, full chat-from-dashboard, or read-only with orchestrator-only chat?"
    options_considered:
      - "Read-only at launch, add chat-from-dashboard later as Phase 2B"
      - "Full read-write (chat into any child) at Phase 2 launch"
      - "Read-only board + chat-to-orchestrator-only"
    chosen: "Read-only at launch, add chat later (option 1)"
    rationale: "User chose this in Step 3 Q2. Lower risk surface, faster ship. User already has chat via native Slack/Discord threads from Phase 1."
    asked_at: step-3
    answered_by: user

forced_defaults:
  - id: F1
    decision: "Concurrency cap per orchestrator: 5 parallel running tasks"
    alternative: "Higher (10+), lower (2-3), or unlimited"
    rationale: "Enough parallelism for typical workflows; low enough that container overhead × 11 agent groups doesn't melt single host. Configurable via agent_roles.config_json at role-grant time."

  - id: F2
    decision: "No-progress timeout default: 30 minutes (1800 seconds) for tasks without explicit deadline"
    alternative: "Shorter (10-15 min), longer (60+ min), or no default (require explicit deadline)"
    rationale: "Codex's prior cycle landed on this. Same order of magnitude as Temporal heartbeat-timeout guidance. Configurable per role grant."

  - id: F3
    decision: "Cancellation grace window: 2 minutes between cooperative cancel signal and hard kill"
    alternative: "Shorter (30s), longer (5+ min), or per-task override"
    rationale: "Matches existing NanoClaw container shutdown semantics. Long enough for an agent to flush in-flight work; short enough to bound user-visible cancellation latency."

  - id: F4
    decision: "Eligible target groups: all existing groups except orchestrator-self and other orchestrators"
    alternative: "Per-target allowlist (codify in agent_roles.config_json) or per-target ACL rows in agent_destinations"
    rationale: "Role grant IS the authorization. Per-target ACL would replicate agent_destinations (the pattern we explicitly diverge from). Self-dispatch and orchestrator-to-orchestrator excluded to prevent loops."

  - id: F5
    decision: "Live updates transport: Server-Sent Events (SSE)"
    alternative: "WebSocket (bidirectional), HTTP long-polling"
    rationale: "Lower memory, simpler reconnection. One-way push is sufficient for read-only dashboard. Design phase can revisit if Phase 2B (chat) needs WebSocket later."

  - id: F6
    decision: "Dashboard framework: Vite + React (over Next.js)"
    alternative: "Next.js, SvelteKit, raw vanilla TypeScript+React"
    rationale: "Memory budget driver. Next.js dev/runtime adds non-trivial overhead; SSR is unnecessary for a localhost owner-only dashboard. Design phase confirms."

  - id: F7
    decision: "task_id derivation: caller-supplied idempotency key, formatted as task-${idempotency_key}"
    alternative: "Server-issued ID + separate idempotency key (Stripe-style two-namespace pattern)"
    rationale: "Deterministic; orchestrator can reference task_id immediately without host round-trip. Trade-off: idempotency_key and task_id retention TTLs are coupled — document in schema."

  - id: F8
    decision: "Dispatch authorization: role grant gives blanket dispatch authority across all non-orchestrator groups"
    alternative: "Per-target authorization row required for each new target (mirrors agent_destinations)"
    rationale: "Role grant IS the authorization. Per-call ACL would defeat the orchestrator pattern. Cancellation still requires parent_session_id match (C6) for security."

  - id: F9
    decision: "Phase 0 lookback extractor scope: keep at scripts/lookback.ts, no further iteration in this brief"
    alternative: "Bring lookback into the orchestrator/dashboard surface"
    rationale: "Phase 0 already complete and useful (surfaced 4 actionable items today). Restored from HEAD. Future dashboard can integrate the same data source as a 'recent threads' view, but not in this brief."

phasing:
  - phase: 0
    name: "Lookback extractor"
    status: complete

    alternatives_considered:
      - "Strip entirely (chosen — user explicitly wants no dead code; cross-group can be re-introduced explicitly later if a real admin-level use case emerges)"
      - "Add feature flag and keep cross-group as opt-in"
      - "Repurpose cross-group as 'specialist groups' option (rejected — duplicates existing /create-agent flow with no semantic distinction)"
    grounding:

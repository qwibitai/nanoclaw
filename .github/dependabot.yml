version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "ci"
    groups:
      iaify-shared:
        patterns:
          - "Ai-road-4-You/*"

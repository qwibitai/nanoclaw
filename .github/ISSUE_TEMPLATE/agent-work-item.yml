name: Agent Work Item
description: Standard task template for multi-agent execution.
title: "[Work] "
labels:
  - status:triage
  - lane:core
  - priority:p2
  - risk:low
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem or opportunity are we addressing?
      placeholder: Describe the context and desired outcome.
    validations:
      required: true
  - type: dropdown
    id: work_type
    attributes:
      label: Work Type
      options:
        - Feature
        - Bug Fix
        - Reliability
        - Governance/Workflow
        - Documentation
    validations:
      required: true
  - type: dropdown
    id: execution_board
    attributes:
      label: Execution Board
      description: Choose the one board that should track this work item.
      options:
        - NanoClaw Platform
        - Andy/Jarvis Delivery
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is explicitly in scope and out of scope?
      placeholder: In scope..., Out of scope...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List deterministic checks that define done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: expected_productivity_gain
    attributes:
      label: Expected Productivity Gain
      description: Describe the concrete quality, operator-load, latency, or throughput gain expected from this work.
      placeholder: Fewer manual review steps, faster PR turnaround, lower operator burden...
    validations:
      required: true
  - type: input
    id: base_branch
    attributes:
      label: Base Branch
      description: Approved base branch for implementation work.
      placeholder: main
      value: main
    validations:
      required: true
  - type: textarea
    id: required_checks
    attributes:
      label: Required Checks
      description: List the commands or checks the implementation lane must run before review.
      placeholder: |
        - npm run build
        - npm test
    validations:
      required: true
  - type: textarea
    id: required_evidence
    attributes:
      label: Required Evidence
      description: Describe the evidence that must appear in the PR or board handoff before review.
      placeholder: Build/test output, linked PR, evidence artifact paths...
    validations:
      required: true
  - type: textarea
    id: blocked_if
    attributes:
      label: Blocked If
      description: List the conditions that should force the automation lane to stop and mark the work blocked instead of guessing.
      placeholder: Missing API access, unclear scope, failing required checks...
    validations:
      required: true
  - type: textarea
    id: ready_checklist
    attributes:
      label: Ready Checklist
      description: Codex must validate and check every item below before moving the board status to Ready.
      value: |
        - [ ] Problem Statement is explicit and implementation-relevant.
        - [ ] Execution Board is correct for this work.
        - [ ] Scope includes clear in-scope and out-of-scope boundaries.
        - [ ] Acceptance Criteria are deterministic and testable.
        - [ ] Expected Productivity Gain is concrete.
        - [ ] Base Branch is approved.
        - [ ] Required Checks are concrete commands.
        - [ ] Required Evidence is explicit.
        - [ ] Blocked If conditions are explicit.
        - [ ] Source Discussion is linked when promoted from a discussion.
        - [ ] Suggested Owner is set or intentionally omitted.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and Dependencies
      description: Note regressions, blockers, or linked dependencies.
      placeholder: blocked-by #123, risk areas...
    validations:
      required: false
  - type: input
    id: source_discussion
    attributes:
      label: Source Discussion
      description: Link the GitHub Discussion if this work was promoted from research, changelog review, or tooling evaluation.
      placeholder: https://github.com/<owner>/<repo>/discussions/<id>
    validations:
      required: false
  - type: input
    id: owner
    attributes:
      label: Suggested Owner
      description: Agent or human expected to execute this item.
      placeholder: agent:claude
    validations:
      required: false

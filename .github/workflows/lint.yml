# .github/workflows/lint.yml
name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint + Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

name: Project Intake Sync

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    env:
      ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
      PLATFORM_PROJECT_OWNER: ingpoc
      PLATFORM_PROJECT_NUMBER: 1
      PLATFORM_PROJECT_URL: https://github.com/users/ingpoc/projects/1
      PLATFORM_PROJECT_NAME: NanoClaw Platform
      DELIVERY_PROJECT_OWNER: openclaw-gurusharan
      DELIVERY_PROJECT_NUMBER: 2
      DELIVERY_PROJECT_URL: https://github.com/users/openclaw-gurusharan/projects/2
      DELIVERY_PROJECT_NAME: Andy/Jarvis Delivery
    steps:
      - name: Skip when project token is unavailable
        if: ${{ env.ADD_TO_PROJECT_PAT == '' }}
        run: echo "ADD_TO_PROJECT_PAT is not configured; skipping."

      - name: Check out repository
        if: ${{ env.ADD_TO_PROJECT_PAT != '' }}
        uses: actions/checkout@v4

      - name: Add issue to project and initialize fields
        if: ${{ env.ADD_TO_PROJECT_PAT != '' }}
        env:
          GITHUB_TOKEN: ${{ env.ADD_TO_PROJECT_PAT }}
        run: node scripts/workflow/github-project-sync.js intake

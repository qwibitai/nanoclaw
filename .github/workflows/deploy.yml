name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build backend
        run: |
          npm ci
          npm run build

      - name: Build portal
        run: |
          cd portal
          npm ci
          npm run build

      - name: Build container image
        run: docker build -t bhd-itsm-agent:latest ./container


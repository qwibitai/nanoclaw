name: Project Status Sync

on:
  issues:
    types: [opened, reopened, assigned, unassigned, labeled, unlabeled, closed]
  pull_request:
    types: [opened, reopened, ready_for_review, converted_to_draft, synchronize, closed, edited]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: project-status-sync-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  sync-project-status:
    runs-on: ubuntu-latest
    env:
      ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
      PROJECT_OWNER: ingpoc
      PROJECT_NUMBER: 1
      PROJECT_URL: https://github.com/users/ingpoc/projects/1
    steps:
      - name: Skip when project token is unavailable
        if: ${{ env.ADD_TO_PROJECT_PAT == '' }}
        run: echo "ADD_TO_PROJECT_PAT is not configured; skipping."

      - name: Check out repository
        if: ${{ env.ADD_TO_PROJECT_PAT != '' }}
        uses: actions/checkout@v4

      - name: Sync issue-first project state
        if: ${{ env.ADD_TO_PROJECT_PAT != '' }}
        env:
          GITHUB_TOKEN: ${{ env.ADD_TO_PROJECT_PAT }}
        run: node scripts/workflow/github-project-sync.js status

name: Build Linux Session Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.linux-session'
      - '.github/workflows/build-linux-session.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image is published as ghcr.io/<owner>/nanoclaw-linux
  # After the first push, set visibility to Public in:
  # GitHub → Packages → nanoclaw-linux → Package settings → Change visibility
  IMAGE_NAME: ${{ github.repository_owner }}/nanoclaw-linux

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.linux-session
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

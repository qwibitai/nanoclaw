name: Multi-Agent Governance

on:
  issues:
    types: [opened, edited, reopened, unlabeled]
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  issue-default-labels:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Ensure required issue labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const existing = new Set((issue.labels || []).map((l) => l.name));
            const requiredGroups = [
              { prefix: "lane:", fallback: "lane:core" },
              { prefix: "priority:", fallback: "priority:p2" },
              { prefix: "risk:", fallback: "risk:low" },
            ];

            const add = [];
            for (const group of requiredGroups) {
              const hasGroup = Array.from(existing).some((name) => name.startsWith(group.prefix));
              if (!hasGroup) add.push(group.fallback);
            }

            if (context.payload.action === "opened" && !existing.has("status:triage")) {
              add.push("status:triage");
            }

            if (add.length === 0) {
              core.info("Issue already has required label groups.");
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: add,
            });
            core.info(`Added labels: ${add.join(", ")}`);

  pr-linked-issue:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Enforce issue linkage
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const body = pr.body || "";
            const closesKeyword = /\b(close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+\b/i;
            const genericIssueRef = /\B#\d+\b/;
            const maintenanceFallback =
              /\b(?:No issue|N\/A)\s*:\s*(maintenance|docs|governance|automation|admin)\b/i;

            if (
              closesKeyword.test(body) ||
              genericIssueRef.test(body) ||
              maintenanceFallback.test(body)
            ) {
              core.info("Issue link or approved maintenance fallback detected in PR body.");
              return;
            }

            core.setFailed(
              "PR body must include at least one issue reference. For maintenance/docs/governance work, use `No issue: maintenance` in the Linked Work Item section."
            );

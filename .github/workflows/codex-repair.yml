name: Codex Repair (On Demand)

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: codex-repair-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  codex-repair:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput(
              'same_repo',
              String(pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`),
            );

      - name: Explain unsupported fork PRs
        if: steps.pr.outputs.same_repo != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: [
                'Codex repair is limited to same-repository branches.',
                'This PR comes from a fork, so I did not attempt an automated fix.',
                'Run the fix locally or apply it on a branch in this repository.',
              ].join('\n'),
            });
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}

      - name: Checkout PR branch
        if: steps.pr.outputs.same_repo == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Fetch base branch
        if: steps.pr.outputs.same_repo == 'true'
        run: git fetch --no-tags origin ${{ steps.pr.outputs.base_ref }}

      - name: Run Codex repair
        if: steps.pr.outputs.same_repo == 'true'
        id: codex
        uses: openai/codex-action@v1
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_BASE_REF: ${{ steps.pr.outputs.base_ref }}
          PR_HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          TRIGGER_AUTHOR: ${{ github.actor }}
          TRIGGER_COMMENT: ${{ github.event.comment.body }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/pr-fix.md
          safety-strategy: drop-sudo
          sandbox: workspace-write
          codex-args: '["--full-auto"]'

      - name: Detect Codex changes
        if: steps.pr.outputs.same_repo == 'true'
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push repair
        if: steps.pr.outputs.same_repo == 'true' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(codex): apply requested PR repair"
          git push origin HEAD:${{ steps.pr.outputs.head_ref }}

      - name: Report Codex result
        if: always() && steps.pr.outputs.same_repo == 'true'
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
          CODEX_OUTCOME: ${{ steps.codex.outcome }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPAIR_CHANGED: ${{ steps.changes.outputs.changed }}
          PR_HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        with:
          script: |
            const outcome = process.env.CODEX_OUTCOME || 'skipped';
            const changed = process.env.REPAIR_CHANGED === 'true';
            const summary = process.env.CODEX_FINAL_MESSAGE?.trim() || 'Codex completed without a final summary.';
            const headline =
              outcome !== 'success'
                ? 'Codex repair failed before a fix could be applied.'
                : changed
                  ? `Codex pushed a repair commit to \`${process.env.PR_HEAD_REF}\`.`
                  : 'Codex did not find a safe bounded fix to commit.';
            const body = [
              headline,
              '',
              'Summary:',
              summary,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });

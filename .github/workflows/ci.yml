name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

      - name: Build Docker image
        run: docker build -t nanoclaw:latest -f container/Dockerfile .
      
      - name: Run Trivy vulnerability
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nanoclaw:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true

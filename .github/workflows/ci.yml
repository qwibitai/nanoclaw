name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Workflow contract lint
        run: bash scripts/check-workflow-contracts.sh

      - name: Claude/Codex mirror lint
        run: bash scripts/check-claude-codex-mirror.sh

      - name: Tooling governance lint
        run: bash scripts/check-tooling-governance.sh

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

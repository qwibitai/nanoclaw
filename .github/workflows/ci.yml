name: CI

on:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck (harness)
        run: npx tsc --noEmit

      - name: Typecheck (agent-runner)
        run: cd container/agent-runner && npx tsc --noEmit

      - name: Contract check
        run: npm run contract:check

      - name: Tests (harness)
        run: npx vitest run

      - name: Tests (agent-runner)
        run: cd container/agent-runner && npx vitest run

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0  # Needed for git diff in path filter

      - name: Check if E2E-relevant files changed
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # For push to main, check changed files in the push
            CHANGED=$(git diff --name-only HEAD~1...HEAD 2>/dev/null || echo "")
            if [ -z "$CHANGED" ] || echo "$CHANGED" | grep -qE '^(container/|src/|package\.json|package-lock\.json|tests/e2e/|vitest\.config\.e2e\.ts)'; then
              echo "relevant=true" >> "$GITHUB_OUTPUT"
              echo "E2E-relevant files changed (or first push) — will run E2E tests."
            else
              echo "relevant=false" >> "$GITHUB_OUTPUT"
              echo "No E2E-relevant files changed — skipping E2E tests."
            fi
          else
            # For PRs, compare base to head
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
            CHANGED=$(git diff --name-only "$BASE"..."$HEAD")

            if echo "$CHANGED" | grep -qE '^(container/|src/|package\.json|package-lock\.json|tests/e2e/|vitest\.config\.e2e\.ts)'; then
              echo "relevant=true" >> "$GITHUB_OUTPUT"
              echo "E2E-relevant files changed — will run E2E tests."
            else
              echo "relevant=false" >> "$GITHUB_OUTPUT"
              echo "No E2E-relevant files changed — skipping E2E tests."
            fi
          fi

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.relevant == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.filter.outputs.relevant == 'true'
        run: npm ci

      - name: Build agent-runner dist
        if: steps.filter.outputs.relevant == 'true'
        run: npm run build

      - name: Set up Docker Buildx
        if: steps.filter.outputs.relevant == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        if: steps.filter.outputs.relevant == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./container
          load: true
          tags: nanoclaw-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run E2E tests
        if: steps.filter.outputs.relevant == 'true'
        run: npx vitest run --config vitest.config.e2e.ts

  pr-policy:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check test coverage for changed source files
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          # Get changed source files (exclude tests, test utilities, config, docs, hooks, container agent-runner)
          CHANGED_SRC=$(git diff --name-only "$BASE"..."$HEAD" -- \
            '*.ts' '*.js' '*.tsx' '*.jsx' | \
            grep -vE '(\.(test|spec|test-util)\.|__tests__|\.config\.|vitest\.|CLAUDE\.md|\.claude/|container/agent-runner/|\.husky/)' || true)

          if [ -z "$CHANGED_SRC" ]; then
            echo "No source files changed — skipping test coverage check."
            exit 0
          fi

          # Parse test-exceptions from PR body
          # Format A: ```test-exceptions\nsrc/file.ts: reason\n```
          # Format B: ### test-exceptions\n```\nsrc/file.ts — reason\n```
          # Extract file paths (src/...) from either format, tolerating any separator
          BLOCK_A=$(echo "$PR_BODY" | sed -n '/^```test-exceptions/,/^```/p' | grep -v '^```' || true)
          BLOCK_B=$(echo "$PR_BODY" | awk '/^###.*test-exceptions/{f=1;next} f&&/^`{3}/&&!i{i=1;next} f&&i&&/^`{3}/{exit} f&&i{print}')
          EXCEPTIONS=$(printf '%s\n%s' "$BLOCK_A" "$BLOCK_B" | grep -oE 'src/[^ :—|]+' | xargs || true)

          # Get changed test files
          CHANGED_TESTS=$(git diff --name-only "$BASE"..."$HEAD" -- \
            '*.ts' '*.js' '*.tsx' '*.jsx' | \
            grep -E '\.(test|spec)\.(ts|js|tsx|jsx)$' || true)

          SRC_COUNT=$(echo "$CHANGED_SRC" | wc -l)

          # Check each source file for a corresponding test change
          UNCOVERED=""
          while IFS= read -r src_file; do
            [ -z "$src_file" ] && continue
            basename=$(basename "$src_file" | sed 's/\.\(ts\|js\|tsx\|jsx\)$//')

            FOUND=false

            # Check test-exceptions from PR body
            if [ -n "$EXCEPTIONS" ] && echo "$EXCEPTIONS" | grep -qF "$src_file"; then
              FOUND=true
            fi

            if [ "$FOUND" = false ] && [ -n "$CHANGED_TESTS" ]; then
              # Match: exact test file, prefixed test file, or __tests__ directory
              if echo "$CHANGED_TESTS" | grep -qE "(${basename}[\.-](test|spec)\.|${basename}-[a-z0-9-]+\.(test|spec)\.|$(dirname "$src_file")/__tests__/)"; then
                FOUND=true
              fi

              # Check if any changed test imports this source file
              if [ "$FOUND" = false ]; then
                while IFS= read -r test_file; do
                  [ -z "$test_file" ] && continue
                  [ ! -f "$test_file" ] && continue
                  if grep -qE "from ['\"].*/${basename}(\.js)?['\"]" "$test_file" 2>/dev/null; then
                    FOUND=true
                    break
                  fi
                done <<< "$CHANGED_TESTS"
              fi
            fi

            if [ "$FOUND" = false ]; then
              UNCOVERED="${UNCOVERED}  - ${src_file}\n"
            fi
          done <<< "$CHANGED_SRC"

          if [ -z "$UNCOVERED" ]; then
            echo "Test coverage check passed: $SRC_COUNT source file(s) all have corresponding test changes."
            exit 0
          fi

          echo "::error::Test coverage policy: $SRC_COUNT source file(s) changed but these have NO corresponding test changes:"
          echo -e "$UNCOVERED"
          echo ""
          echo "Before merging, ensure:"
          echo "  1. Unit tests cover the actual changes"
          echo "  2. If no tests exist for a module, write them"
          echo "  3. To exempt files that genuinely don't need test changes, add to your PR body:"
          echo ""
          echo '  ```test-exceptions'
          echo '  src/file.ts: reason why no tests needed'
          echo '  ```'
          exit 1

      - name: Check PR body has verification section
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -qiE '(##\s*Verification|##\s*Test\s+plan|Success\s+criteria)'; then
            echo "Verification section found in PR body."
            exit 0
          fi

          echo "::error::Missing Verification section in PR body."
          echo ""
          echo "Every PR must include a Verification section with:"
          echo "  1. Concrete success criteria"
          echo "  2. How to verify (commands or steps)"
          echo "  3. Expected outcome"
          echo ""
          echo "Example:"
          echo "  ## Verification"
          echo "  - [ ] Run npm run build — completes without errors"
          echo "  - [ ] Send test message — agent responds within 30s"
          exit 1

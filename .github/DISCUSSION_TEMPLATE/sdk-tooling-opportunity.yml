title: "[SDK/Tooling] "
body:
  - type: dropdown
    id: source_system
    attributes:
      label: Source System
      options:
        - Claude Code
        - Claude Agent SDK
        - OpenCode
        - Cross-system
    validations:
      required: true
  - type: dropdown
    id: change_type
    attributes:
      label: Change Type
      options:
        - Changelog / release note
        - New feature
        - API / SDK capability
        - Workflow / tooling pattern
        - Reliability / performance improvement
    validations:
      required: true
  - type: textarea
    id: upstream_change
    attributes:
      label: Upstream Change
      description: Summarize the new feature, release, or behavior change.
      placeholder: What changed upstream?
    validations:
      required: true
  - type: textarea
    id: nanoclaw_fit
    attributes:
      label: NanoClaw Fit
      description: Map it to `main`, `andy-developer`, `jarvis-worker-*`, or the shared runtime.
      placeholder: Where does this fit in NanoClaw, and why?
    validations:
      required: true
  - type: textarea
    id: candidate_adoption
    attributes:
      label: Candidate Adoption
      description: Describe the concrete change we could make if we adopt it.
      placeholder: What would we implement, replace, or pilot?
    validations:
      required: true
  - type: textarea
    id: expected_gain
    attributes:
      label: Expected Gain
      description: State the expected quality, operator-load, latency, or throughput improvement if we adopt this change.
      placeholder: Lower operator load, clearer review handoffs, faster implementation cycles...
    validations:
      required: true
  - type: dropdown
    id: board_target
    attributes:
      label: Board Target
      description: Choose the execution board if this discussion is promoted.
      options:
        - NanoClaw Platform
        - Andy/Jarvis Delivery
    validations:
      required: true
  - type: textarea
    id: evidence_links
    attributes:
      label: Evidence and Links
      description: Include the official changelog/release-note link first, then the official implementation or usage docs used to evaluate the feature.
      placeholder: |
        Changelog:
        https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md

        Docs:
        https://code.claude.com/docs/en/overview
        https://code.claude.com/docs/en/headless
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and Constraints
      description: List mission, reliability, contract, or operational risks.
      placeholder: What could break, drift, or add operator overhead?
    validations:
      required: true
  - type: textarea
    id: decision_contract
    attributes:
      label: Decision Contract
      description: Claude and Codex must both comment with an explicit agent label (`Agent Label: Claude Code` or `Agent Label: Codex`) plus one of `accept`, `pilot`, `defer`, or `reject`. Unanimous `accept` or `pilot` means dedupe against any existing promoted Issues, then create or reuse the execution Issue, add it to the selected board, and leave a promotion summary comment in the Discussion, unless a human explicitly overrides.
      placeholder: Require labeled Claude/Codex decision comments, dedupe promotions, then move the surviving accept/pilot items to the chosen board with a summary comment.
    validations:
      required: true

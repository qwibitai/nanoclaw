title: "[Workflow] "
body:
  - type: dropdown
    id: discussion_type
    attributes:
      label: Discussion Type
      options:
        - Workflow / Operating Model
        - Claude/Codex Collaboration
        - Mission Alignment
    validations:
      required: true
  - type: textarea
    id: current_state
    attributes:
      label: Current State
      description: What is happening today and why is it insufficient?
      placeholder: Describe the present workflow, friction, or gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: What should change?
      placeholder: Describe the workflow or collaboration change.
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Decision Needed
      description: What specific decision or next action should come out of this discussion?
      placeholder: Accept / reject / defer / promote to Issue.
    validations:
      required: true

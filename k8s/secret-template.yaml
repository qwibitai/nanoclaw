# Template for the nanoclaw-secrets K8s Secret.
# DO NOT commit this file with real values.
# Create the secret with:
#   kubectl create secret generic nanoclaw-secrets \
#     --from-literal=ANTHROPIC_API_KEY=<your-key> \
#     --from-literal=CLAUDE_CODE_OAUTH_TOKEN=<your-token>
#
# Or apply this file after filling in the base64-encoded values:
#   echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: nanoclaw-secrets
  # Change namespace to match K8S_NAMESPACE if not 'default'
type: Opaque
data:
  ANTHROPIC_API_KEY: "<base64-encoded-key>"
  CLAUDE_CODE_OAUTH_TOKEN: "<base64-encoded-token>"

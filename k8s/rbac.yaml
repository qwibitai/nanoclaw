---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nanoclaw
  # Change namespace to match K8S_NAMESPACE if not 'default'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nanoclaw-job-manager
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nanoclaw-job-manager
subjects:
  - kind: ServiceAccount
    name: nanoclaw
roleRef:
  kind: Role
  name: nanoclaw-job-manager
  apiGroup: rbac.authorization.k8s.io

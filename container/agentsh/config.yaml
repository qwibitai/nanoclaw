# agentsh Server Configuration for NanoClaw Agent Containers
# Security policy engine, threat feeds, and DLP for container agents

server:
  http:
    addr: "127.0.0.1:18080"

auth:
  type: "none"  # Single-container setup, no external access needed

logging:
  level: "info"
  format: "json"
  output: "/home/node/.agentsh/logs/server.log"
  rotation:
    max_size_mb: 50
    max_age_days: 3
    max_backups: 2
    compress: true

audit:
  enabled: true
  output: "/home/node/.agentsh/logs/audit.jsonl"
  rotation:
    max_size_mb: 100
    max_age_days: 7
    max_backups: 3
    compress: true
  storage:
    sqlite_path: "/home/node/.agentsh/data/events.db"

sessions:
  base_dir: "/home/node/.agentsh/sessions"

# LLM Proxy with DLP — intercepts API calls, redacts PII before forwarding
# to the nanoclaw credential proxy on the host.
# Flow: SDK -> agentsh proxy (DLP) -> credential proxy (key injection) -> Anthropic
proxy:
  mode: "embedded"
  port: 18081
  providers:
    # Replaced at container startup by entrypoint.sh with the actual
    # credential proxy URL (e.g. http://host.docker.internal:3001)
    anthropic: "CREDENTIAL_PROXY_UPSTREAM"

# Data Loss Prevention — redact PII before it reaches the LLM provider
dlp:
  mode: "redact"
  patterns:
    email: true
    phone: true
    credit_card: true
    ssn: true
    api_keys: true
  custom_patterns:
    - name: aws_access_key
      display: aws_key
      regex: "AKIA[0-9A-Z]{16}"
    - name: private_key_header
      display: private_key
      regex: "-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----"

policies:
  dir: "/etc/agentsh/policies"
  default: "nanoclaw"
  detect_project_root: false  # Container workspace paths are fixed

# Threat intelligence — block connections to known malicious domains
threat_feeds:
  enabled: true
  sync_interval: 12h
  cache_dir: "/home/node/.agentsh/threat-feeds"
  allowlist: []
  feeds:
    - name: abuse-ch-urlhaus
      url: "https://urlhaus.abuse.ch/downloads/hostfile/"
      format: hostfile
    - name: phishing-army
      url: "https://phishing.army/download/phishing_army_blocklist.txt"
      format: domain-list
    - name: malware-filter
      url: "https://malware-filter.gitlab.io/malware-filter/urlhaus-filter-hosts.txt"
      format: hostfile

sandbox:
  env_inject:
    BASH_ENV: "/usr/lib/agentsh/bash_startup.sh"

health:
  path: "/health"
  readiness_path: "/ready"

development:
  debug: false
  disable_auth: true
  disable_policy: false

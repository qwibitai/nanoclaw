# Project-level Codex role configuration for NanoClaw
# Canonical policy remains in CLAUDE.md; this file adapts role behavior.

model = "gpt-5.4"
model_reasoning_effort = "xhigh"
review_model = "gpt-5.4"
developer_instructions = """
Operate as the main orchestrator.
Delegate only when the delegated lane has a clear payoff in speed, evidence quality, or isolation.
Do not spawn subagents for routine reads, small tasks, or because a role exists.
Before delegating, decide what exact artifact is needed, whether the main lane can do it faster directly, and whether parallel work exists while the subagent runs.
Keep user interaction, prioritization, architecture, contract decisions, and final synthesis in the main lane.
Default pattern: at most one evidence-gathering lane (`explorer` or `reviewer`) plus one background `monitor`.
Use `reviewer` only after a coherent diff or stable repro exists.
Use `worker` only after scope is locked and never run more than one write-enabled worker at a time.
Use `gpt54_escalation` only after repeated failed local loops or genuine cross-system ambiguity.
"""

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.explorer]
description = "Read-only codebase explorer for planning, logs, and scoping."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Read-only reviewer focused on regressions, contract boundaries, and reliability risks."
config_file = "agents/reviewer.toml"

[agents.monitor]
description = "Long-running monitor for deterministic checks, polling, and background verification."
config_file = "agents/monitor.toml"

[agents.worker]
description = "Scoped implementation worker for approved touch-set changes."
config_file = "agents/worker.toml"

[profiles.gpt54_escalation]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

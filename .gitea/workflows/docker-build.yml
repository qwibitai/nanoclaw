name: Docker Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: gitea.pitthappens.dyndns.org
  OWNER: ragincajunbanjo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push nanoclaw
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw:buildcache,mode=max

      - name: Build and push nanoclaw-agent
        uses: docker/build-push-action@v6
        with:
          context: ./container
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw-agent:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw-agent:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/nanoclaw-agent:buildcache,mode=max

services:
  nanoclaw:
    build: .
    image: nanoclaw:latest
    container_name: nanoclaw
    restart: unless-stopped
    env_file: .env
    environment:
      HOME: /app
      # Контейнеры агентов подключаются к credential proxy по host.docker.internal
      CREDENTIAL_PROXY_HOST: 0.0.0.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nanoclaw_store:/app/store
      - nanoclaw_groups:/app/groups
      - nanoclaw_data:/app/data
      - nanoclaw_logs:/app/logs
      - nanoclaw_config:/app/.config/nanoclaw
    # Порт credential proxy — агенты подключаются через host
    ports:
      - "3001:3001"

volumes:
  nanoclaw_store:
  nanoclaw_groups:
  nanoclaw_data:
  nanoclaw_logs:
  nanoclaw_config:
